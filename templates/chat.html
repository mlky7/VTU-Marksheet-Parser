<!-- ADD THIS SCRIPT TAG (Preferably right before your closing </body> tag) -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- CHAT FLOATING BUTTON -->
<div id="chat-fab" class="fixed bottom-6 right-6 z-40">
  <button id="chat-toggle" class="w-14 h-14 rounded-full bg-brand-600 text-white shadow-soft hover:bg-brand-700 flex items-center justify-center text-2xl">💬</button>
</div>

<!-- CHAT PANEL -->
<div id="chat-panel" class="hidden fixed bottom-24 right-6 w-[min(380px,calc(100vw-2rem))] h-[520px] bg-white rounded-2xl shadow-2xl border border-slate-200 z-40 flex flex-col overflow-hidden">
  
  <!-- UPDATED HEADER: Includes Clear Chat & Close buttons -->
  <div class="px-4 py-3 bg-gradient-to-r from-brand-600 to-brand-700 text-white flex items-center justify-between">
    <div class="flex items-center gap-2 font-semibold"><span>🎓</span> VTU Assistant</div>
    <div class="flex items-center gap-3">
      <!-- Clear Chat Button -->
      <button id="chat-clear" class="opacity-80 hover:opacity-100 transition-opacity" title="Clear Chat History">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
        </svg>
      </button>
      <!-- Existing Close Button -->
      <button id="chat-close" class="opacity-80 hover:opacity-100 transition-opacity" title="Close Chat">✕</button>
    </div>
  </div>
  
  <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50 text-sm"></div>
  
  <form id="chat-form" class="p-3 border-t border-slate-200 flex gap-2 bg-white items-center">
    <!-- Paperclip Upload Button -->
    <label for="chat-file-upload" class="cursor-pointer p-2 text-slate-400 hover:text-brand-600 transition-colors" title="Upload Marksheet PDF">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path>
      </svg>
    </label>
    <input type="file" id="chat-file-upload" class="hidden" accept=".pdf">
    
    <input id="chat-input" autocomplete="off" placeholder="Ask or upload PDF…" class="flex-1 rounded-lg border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none">
    <button class="px-4 py-2 rounded-lg bg-brand-600 text-white font-semibold hover:bg-brand-700 disabled:opacity-50" id="chat-send">Send</button>
  </form>
</div>
